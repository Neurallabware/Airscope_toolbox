# Imaging frame rate in Hz.
fr: 10

# Number of frames processed per motion-correction chunk.
mc_chunk_size: 1000

# Number of frames per output zarr chunk.
zarr_chunk_size: 1000

# Motion correction backend selected by this config.
method: caiman

# CaImAn motion correction parameters.
caiman:
  # Save the registered movie generated by CaImAn.
  save_movie: true

  # Maximum allowed rigid shift in pixels along y and x.
  max_shifts: [100, 100]

  # Patch stride and overlap for piecewise registration.
  strides: [96, 96]
  overlaps: [48, 48]

  # Frames per split when CaImAn distributes the movie.
  num_frames_split: 100

  # Maximum deviation for piecewise-rigid shifts.
  max_deviation_rigid: 3

  # Use piecewise-rigid registration when true; rigid registration when false.
  pw_rigid: false

  # Use OpenCV for shift application.
  shifts_opencv: true

  # Border handling after registration.
  border_nan: copy

  # Downsample ratio for estimating motion on large frames.
  downsample_ratio: 0.1
